# typos (crate-ci) — source spell checker config.
# https://github.com/crate-ci/typos

[default.extend-words]
# sed branch-to-label syntax in scripts/clean_commit.sh ( ...;/\n$/ba ).
ba = "ba"
# "pn" / "PN" is the Double Ratchet "previous sending chain length" variable
# (Signal Double Ratchet spec), used throughout src-tauri/src/ratchet and its docs.
pn = "pn"
# "abd" is a test byte-string literal (file_checksum(b"abc") vs b"abd")).
abd = "abd"

[default.extend-identifiers]
# "UPnP" (Universal Plug and Play) trips the Pn->On heuristic.
UPnP = "UPnP"

[files]
extend-exclude = [
  "Cargo.lock",
  "frontend/package-lock.json",
  "package-lock.json",
  "src-tauri/icons/**",
  "specifications/**/*.md",
  # Generated coverage artifacts (function-name fragments trip the checker).
  "**/lcov.info",
  "**/*.info",
  "**/coverage/**",
]
