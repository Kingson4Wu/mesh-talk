name: Bug Report
description: Something isn't working as expected
labels: ["needs-triage"]
body:
  - type: markdown
    attributes:
      value: "Thanks for reporting a bug. Please fill in as much detail as you can."
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Mesh-Talk version / commit
      description: "App version or `git rev-parse --short HEAD`"
      placeholder: "0.1.0 or abc1234"
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - Desktop app (Tauri)
        - Headless node (mesh-talk-node)
        - Build / tooling
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps that reliably reproduce the issue
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: What actually happened?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Console output or app logs (remove any personal info / keys)"
      render: shell
  - type: checkboxes
    id: health
    attributes:
      label: Health check
      options:
        - label: I ran `make check` (or `./scripts/check-health.sh`) and noted relevant output above
