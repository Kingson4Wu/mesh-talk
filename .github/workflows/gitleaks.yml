name: Gitleaks

# Secret scanning — fails the build if a credential-shaped string lands in the
# tree or history (keys, tokens). Runs the gitleaks CLI directly (MIT, free).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only: the scan only checks out history and runs the gitleaks CLI.
permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # full history so a secret in any commit is caught
      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
        run: |
          set -euo pipefail
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          ./gitleaks git . --config .gitleaks.toml --redact -v
