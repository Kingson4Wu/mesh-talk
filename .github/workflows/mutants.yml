name: Mutation Testing

# cargo-mutants injects bugs and checks the test suite catches them (the Rust
# equivalent of Stryker). It runs the suite once per mutant, so it is slow:
#   - on PRs it only tests mutants in the changed lines (fast),
#   - weekly / on demand it runs the full sweep.
# Surviving mutants are surfaced as annotations + an artifact but do NOT block
# (this is an existing codebase; treat results as a coverage-quality signal).
on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 4 * * 1' # Mondays 04:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutants:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # PR-diff mode needs history

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install cargo-mutants
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-mutants

      - name: Compute PR diff
        if: github.event_name == 'pull_request'
        run: git diff "origin/${{ github.base_ref }}"...HEAD > mutants-diff.patch

      - name: Mutants (PR diff)
        if: github.event_name == 'pull_request'
        working-directory: src-tauri
        continue-on-error: true
        run: cargo mutants --no-shuffle -vV --in-diff ../mutants-diff.patch -j 2 -- --test-threads=2

      - name: Mutants (full sweep)
        if: github.event_name != 'pull_request'
        working-directory: src-tauri
        continue-on-error: true
        run: cargo mutants --no-shuffle -j 2 -- --test-threads=2

      - name: Upload mutants report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mutants-report
          path: src-tauri/mutants.out/
          if-no-files-found: ignore
