name: UI E2E

# Browser end-to-end tests for the React UI (Playwright + Chromium, headless). Drives the real
# app with a mocked Tauri IPC layer — guards the rendering/wiring that black-screened v0.1.0.
# The Rust multi-process backend E2E lives separately (`make e2e`).
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright UI E2E
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      # The gateway/mesh e2e tests drive a real signaling relay binary; build it so they run
      # (rather than skip on a missing binary) and exercise the current relay, incl. mesh mode.
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build signaling relay
        working-directory: ${{ github.workspace }}
        run: cargo build -p mesh-talk-signal --release

      - name: Run UI E2E
        run: npx playwright test

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
