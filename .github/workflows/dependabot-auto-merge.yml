name: Dependabot auto-merge

# Auto-merge Dependabot PATCH PRs once required checks pass. Minor + major updates
# are left for manual review: for the many 0.x crates here (rand, sha2, glib, ...) a
# "semver-minor" bump (e.g. 0.8 -> 0.9) is actually BREAKING and has landed
# non-compiling changes when auto-merged, so only patch (x.y.Z) is auto-merged.
# Requires "Allow auto-merge" enabled in repo settings and branch protection with the
# "verify" check required.
on: pull_request_target

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3

      - name: Enable auto-merge for patch updates only
        if: steps.meta.outputs.update-type == 'version-update:semver-patch'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
