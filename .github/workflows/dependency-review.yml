name: Dependency Review

# Blocks a PR that introduces a dependency with a known vulnerability (or a disallowed
# license) before it ever lands on main. Complements cargo-deny / cargo-audit (which guard
# the whole tree on every push) by reviewing exactly what a PR changes.
on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Dependency review
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          # MIT-licensed project; flag copyleft/unknown licenses pulled in by a PR.
          deny-licenses: GPL-2.0, GPL-3.0, AGPL-3.0
          comment-summary-in-pr: on-failure
