name: CodeQL

# Advanced CodeQL setup (replaces default setup) so we can apply .github/codeql/codeql-config.yml
# — excluding test files + the noisy rust/hard-coded-cryptographic-value query, and using the
# security-extended suite. NOTE: default setup must stay DISABLED (Settings > Code security >
# Code scanning > leave on "Advanced"); enabling it makes these runs fail with "advanced
# configurations cannot be processed when the default setup is enabled".
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
    strategy:
      fail-fast: false
      matrix:
        # All three use build-mode: none (Rust's CodeQL extractor is source-based and does
        # NOT support autobuild — and none means no Tauri/GTK build deps are needed).
        language: [actions, javascript-typescript, rust]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
