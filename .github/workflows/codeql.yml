name: CodeQL

# Advanced CodeQL setup (replaces GitHub's "default setup") so we can apply a committed
# config — specifically excluding one false-positive-only query (see codeql-config.yml).
# Covers the same languages default setup did: Rust, JavaScript/TypeScript, and Actions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [rust, javascript-typescript, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # codeql-bundle-v2.25.6 (v3)
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # codeql-bundle-v2.25.6 (v3)
        with:
          category: "/language:${{ matrix.language }}"
