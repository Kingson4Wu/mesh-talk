name: CodeQL

# Advanced CodeQL setup (replaces GitHub's "default setup") so we can apply a committed
# config — specifically excluding one false-positive-only query (see codeql-config.yml).
# Covers the same languages default setup did: Rust, JavaScript/TypeScript, and Actions.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1" # weekly, Monday

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [rust, javascript-typescript, actions]
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@dd903d2e4f5405488e5ef1422510ee31c8b32357 # codeql-bundle-v2.25.6 (v3)
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@dd903d2e4f5405488e5ef1422510ee31c8b32357 # codeql-bundle-v2.25.6 (v3)
        with:
          category: "/language:${{ matrix.language }}"
