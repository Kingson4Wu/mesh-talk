name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# Read-only: every job just checks out and runs tooling — nothing writes back.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  checks:
    strategy:
      fail-fast: false
      # Tauri targets desktop: verify on Linux (fast, with the GTK/WebKit deps)
      # and macOS (matches the primary build target).
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # Tauri v2 system libraries (Linux only).
      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # The Tauri build reads frontendDist (../frontend/dist), so build the
      # frontend before any cargo step.
      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Rustfmt (check)
        if: matrix.os == 'ubuntu-latest'
        working-directory: src-tauri
        run: cargo fmt --all -- --check

      - name: Clippy
        if: matrix.os == 'ubuntu-latest'
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        working-directory: src-tauri
        run: cargo test

      - name: Shellcheck scripts
        if: matrix.os == 'ubuntu-latest'
        run: shellcheck --severity=warning scripts/*.sh hooks/* .claude/hooks/*.sh

      - name: Install cargo-audit
        if: matrix.os == 'ubuntu-latest'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # Cargo.lock lives at the workspace root, so run from there.
      - name: Audit Rust dependencies
        if: matrix.os == 'ubuntu-latest'
        run: cargo audit

  # Stable name for the branch-protection required check: stays "verify" no
  # matter how the matrix above evolves.
  verify:
    needs: checks
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: All matrix checks passed
        run: test "${{ needs.checks.result }}" = "success"
