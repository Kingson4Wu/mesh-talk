version: 2
updates:
  # Rust crates (workspace Cargo.lock at repo root).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # One PR/week for minor+patch bumps (auto-merge once CI is green).
      # Majors stay ungrouped so each gets its own PR for manual review.
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # Frontend npm dependencies.
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # GitHub Actions versions used in workflows.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns:
          - "*"
