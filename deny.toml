# cargo-deny — supply-chain policy: advisories, licenses, bans, sources.
# Run: cargo deny check   (https://embarkstudios.github.io/cargo-deny/)

[advisories]
version = 2
# Only flag unmaintained crates that are *direct* workspace dependencies — not
# Tauri's large transitive tree (gtk-rs GTK3 bindings, unic-*, proc-macro-error,
# fxhash), which we cannot fix from here. Yanked transitive crates warn.
unmaintained = "workspace"
yanked = "warn"
# Advisories with no available upstream fix / out of scope, justified per entry.
# Real vulnerabilities not listed here still fail the check.
ignore = [
  # `rsa` Marvin Attack — RSA decryption timing side-channel. No fixed release of
  # the `rsa` crate exists. In Mesh-Talk RSA only wraps the local at-rest
  # contacts key (decrypted once at login); it is not exposed as a network
  # timing oracle, so the practical risk is low. Revisit when `rsa` ships a fix.
  "RUSTSEC-2023-0071",
  # `rand` unsoundness when a custom global logger calls `rand::rng()` reentrantly.
  # Mesh-Talk uses rand for key/nonce generation, not from inside a logger.
  "RUSTSEC-2026-0097",
  # bincode 1.x unmaintained (direct dep, used for local at-rest serialization).
  # No vulnerability; migration to bincode 2.x is tracked separately.
  "RUSTSEC-2025-0141",
]

[licenses]
version = 2
# Permissive licenses only. A dependency under anything else fails the check.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "0BSD",
  "ISC",
  "Zlib",
  "MPL-2.0",
  "BSL-1.0",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "CC0-1.0",
  "Unlicense",
  "OpenSSL",
  "CDLA-Permissive-2.0",
]
confidence-threshold = 0.8

[bans]
# Tauri's tree legitimately pulls several duplicate versions; warn rather than fail.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
